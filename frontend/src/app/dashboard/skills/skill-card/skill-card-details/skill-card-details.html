<div class="skill-admin-item">
  <div class="skill-admin-item__info">
    <span class="skill-admin-item__name">{{ skillDetails.skillName }}</span
    ><span class="skill-admin-item__val">{{ skillDetails.percentage }}%</span>
  </div>
  <div class="skill-admin-bar">
    <div class="skill-admin-fill" [style.width.%]="skillDetails.percentage"></div>
  </div>
  <div class="skill-admin-item__actions">
    <button class="icon-btn">
      <svg viewBox="0 0 24 24">
        <path
          d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"
        />
      </svg>
    </button>
    <button class="icon-btn delete">
      <svg viewBox="0 0 24 24">
        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" />
      </svg>
    </button>
  </div>
</div>
