<!-- ===== SIDEBAR ===== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar__header">
    <a routerLink="" class="sidebar__logo">{{ firstChar }}<span>.</span>{{ lastName || '' }}</a>
    <button class="sidebar__close" id="sidebar-close" aria-label="Close sidebar"></button>
  </div>

  <nav class="sidebar__nav">
    <p class="sidebar__section-label">Main</p>
    <ul class="sidebar__list">
      <li>
        <a routerLink="home" routerLinkActive="active" class="sidebar__link">
          <svg viewBox="0 0 24 24">
            <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" />
          </svg>
          Dashboard
        </a>
      </li>
      <li>
        <a routerLink="contact" routerLinkActive="active" class="sidebar__link">
          <svg viewBox="0 0 24 24">
            <path
              d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"
            />
          </svg>
          Messages
        </a>
      </li>
      <li>
        <a routerLink="project" routerLinkActive="active" class="sidebar__link">
          <svg viewBox="0 0 24 24">
            <path
              d="M20 6h-2.18c.07-.44.18-.88.18-1.33C18 2.54 15.96.5 13.5.5c-1.27 0-2.4.51-3.23 1.33L9 3.05 7.73 1.83C6.9 1.01 5.77.5 4.5.5 2.04.5 0 2.54 0 5c0 .45.11.89.18 1.33H0v2h20V6zm-6-4c1.38 0 2.5 1.12 2.5 2.5 0 .45-.13.87-.33 1.25-.39-.13-.8-.25-1.17-.25H9c-.37 0-.78.12-1.17.25C7.63 5.37 7.5 4.95 7.5 4.5 7.5 3.12 8.62 2 10 2h4zM2 20c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V10H2v10zm10-8l4 4-1.41 1.41L13 15.83V20h-2v-4.17l-1.59 1.58L8 16l4-4z"
            />
          </svg>
          Projects
        </a>
      </li>
      <li>
        <a routerLink="skill" routerLinkActive="active" class="sidebar__link">
          <svg viewBox="0 0 24 24">
            <path
              d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"
            />
          </svg>
          Skills
        </a>
      </li>
      <li>
        <a routerLink="service" routerLinkActive="active" class="sidebar__link">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
            />
          </svg>
          Services
        </a>
      </li>
    </ul>

    <p class="sidebar__section-label">Settings</p>
    <ul class="sidebar__list">
      <li>
        <a routerLink="profile" routerLinkActive="active" class="sidebar__link">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
            />
          </svg>
          Profile
        </a>
      </li>
      <li>
        <a routerLink="/" class="sidebar__link">
          <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" /></svg>
          View Portfolio
        </a>
      </li>
    </ul>
  </nav>

  <div class="sidebar__footer">
    <div class="sidebar__user">
      <div class="sidebar__avatar">{{ firstChar + lastName[0] || '' }}</div>
      <div>
        <p class="sidebar__user-name">{{ userName }}</p>
        <p class="sidebar__user-role">Admin</p>
      </div>
    </div>
  </div>
</aside>

<!-- ===== OVERLAY (mobile) ===== -->
<div class="overlay" id="overlay"></div>

<!-- ===== MAIN WRAPPER ===== -->
<div class="main-wrapper">
  <!-- TOPBAR -->
  <header class="topbar">
    <h5>Dashboard</h5>
    <div class="topbar__left">
      <button class="topbar__menu-btn" id="sidebar-toggle" aria-label="Toggle sidebar">
        <span></span><span></span><span></span>
      </button>
      <h1 class="topbar__title"></h1>
    </div>
    <div class="topbar__right">
      <div class="topbar__search">
        <svg viewBox="0 0 24 24">
          <path
            d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
          />
        </svg>
        <input type="text" placeholder="Search..." class="topbar__search-input" />
      </div>
      <button class="topbar__notif" aria-label="Notifications">
        <svg viewBox="0 0 24 24">
          <path
            d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"
          />
        </svg>
        <span class="topbar__notif-dot"></span>
      </button>
    </div>
  </header>

  <!-- PAGE CONTENT -->
  <main class="dash-content">
    <router-outlet />
  </main>
</div>
