<div class="msg-item unread">
  <div class="msg-item__avatar">SA</div>
  <div class="msg-item__body">
    <div class="msg-item__top">
      <span class="msg-item__name">{{ myCard.name }}</span>
      <span class="msg-item__time">{{ myCard.date }}</span>
    </div>
    <p class="msg-item__text">{{ myCard.message }}</p>
  </div>
  <span class="msg-item__dot"></span>
</div>
