<div class="page" id="page-profile">
  <div class="card profile-card">
    <div class="img-upload">
      <div class="profile-card__avatar">
        <img [src]="previewUrl" alt="Profile picture" />
      </div>

      <div class="file-input-wrap">
        <input type="file" id="avatar-upload" accept="image/*" (change)="onImageSelected($event)" />
        <label for="avatar-upload" class="file-input-btn">
          <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" /></svg>
          Choose Photo
        </label>
        <span class="file-input-name">{{ selectedFileName || 'No file chosen' }}</span>
      </div>
    </div>

    <h2 class="profile-card__name">{{ dataHome?.name }}</h2>
    <p class="profile-card__role">{{ dataHome?.role?.[0] }}</p>
    <form class="profile-form" [formGroup]="myForm" (ngSubmit)="onSubmit()">
      <div class="profile-form__row">
        <div class="profile-form__group">
          <label>Full Name</label>
          <input type="text" class="form__input" formControlName="name" />
        </div>
        <div class="profile-form__group">
          <label>Email</label>
          <input type="email" class="form__input" formControlName="email" />
        </div>
      </div>
      <div class="profile-form__row">
        <div class="profile-form__group">
          <label>Title</label>
          <input type="text" class="form__input" formControlName="title" />
        </div>
        <div class="profile-form__group">
          <label>Location</label>
          <input type="text" class="form__input" formControlName="location" />
        </div>
      </div>
      <div class="profile-form__row">
        <div class="profile-form__group">
          <label>Years Experience</label>
          <input type="text" class="form__input" formControlName="experience" />
        </div>
        <div class="profile-form__group">
          <label>Projects Done</label>
          <input type="text" class="form__input" formControlName="projects" />
        </div>
      </div>
      <div class="profile-form__group">
        <label>GitHub URL</label>
        <input type="text" class="form__input" formControlName="github" />
      </div>
      <div class="profile-form__group">
        <label>LinkedIn URL</label>
        <input type="text" class="form__input" formControlName="linkedin" />
      </div>
      <div class="profile-form__group">
        <label>About Description</label>
        <textarea class="form__textarea" style="height: 120px" formControlName="description">
.</textarea
        >
      </div>
      <button class="btn-green" id="save-profile">Save Changes</button>
    </form>
  </div>
</div>
