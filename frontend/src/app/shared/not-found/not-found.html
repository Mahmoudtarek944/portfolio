<main class="main">
  <section class="notfound">
    <div class="notfound__blob notfound__blob--1"></div>
    <div class="notfound__blob notfound__blob--2"></div>

    <div class="notfound__content">
      <p class="notfound__code">404</p>

      <h1 class="notfound__title">Page Not Found</h1>

      <p class="notfound__desc">
        Looks like this page went <span>missing in action</span>.<br />
        The URL might be wrong, or the page no longer exists.
      </p>

      <div class="notfound__dots">
        <span class="notfound__dot"></span>
        <span class="notfound__dot"></span>
        <span class="notfound__dot"></span>
      </div>

      <div class="notfound__buttons">
        <a routerLink="/home" class="btn btn--primary">← Back to Home</a>
        <a routerLink="/contact" class="btn btn--outline">Contact Me</a>
      </div>
    </div>
  </section>
</main>
